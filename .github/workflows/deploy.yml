name: Deploy Scrollytelling Narrative

on:
  push:
    branches: ["main"] # Change to "master" if your repository default branch uses the older naming convention

# Sets permissions of the GITHUB_TOKEN to allow automated deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment run to maximize network stability
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Root Index File
        run: |
          if [ ! -f "index.html" ]; then 
            echo "CRITICAL STRUCTURE ERROR: index.html was not found in the root directory!"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Asset Payload
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Informs the runner to bundle files sitting directly at root

      - name: Execute GitHub Pages Cloud Deployment
        id: deployment
        uses: actions/deploy-pages@v5
